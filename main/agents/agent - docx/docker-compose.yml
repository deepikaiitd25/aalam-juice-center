ersion: "3.9"

services:
  a2a-docx-agent:
    build: .
    container_name: a2a-docx-agent
    environment:
      - MONGO_URL=mongodb://agents-mongo:27017
      - DB_NAME=a2a-docx-agent
    stdin_open: true
    ports:
      - "5000:5000"
    tty: true
    networks:
      - agents-net
      - agents-db-net

networks:
  agents-net:
    external: true
  agents-db-net:
    external: true
